<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>動詞 — Junior Verb Cards</title>
  <link rel="stylesheet" href="../../style.css">
</head>
<body>
  <div class="main">
    <div class="opts">
      <a href="../" class="hint">← Junior</a>
      <label>Class <select id="class-select" aria-label="Select class"></select></label>
      <span id="class-title" class="class-title"></span>
      <label title="Front: dictionary form, back: ます form"><input type="checkbox" id="include-dictionary" checked /> Dictionary</label>
      <label title="Front: ます form, back: dictionary form"><input type="checkbox" id="include-masu" checked /> ます</label>
    </div>
    <div class="shadow">
      <div class="border">
        <div class="card" id="card">
          <div id="front" class="side front"></div>
          <div id="back" class="side back"></div>
        </div>
      </div>
    </div>
    <div class="footer">
      <p class="hint">Tap or Space to flip · N for next card</p>
      <button type="button" id="next-btn" class="next-btn">Next</button>
    </div>
  </div>
  <script src="./app.js"></script>
</body>
</html>
