<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>単語 — Class Flip Cards</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>
  <div class="main">
    <div class="opts">
      <label>Class <select id="class-select" aria-label="Select class">
        <option value="class1">Class 1</option>
        <option value="class2">Class 2</option>
        <option value="class3">Class 3</option>
      </select></label>
      <span id="class-title" class="class-title"></span>
      <label class="word-only-label" title="Only show the word on the front (kanji/kana); do not include spelling→word cards.">
        <input type="checkbox" id="word-only" /> Word only
      </label>
    </div>
    <div class="shadow">
      <div class="border">
        <div class="card" id="card">
          <div id="front" class="side front"></div>
          <div id="back" class="side back"></div>
        </div>
      </div>
    </div>
    <div class="footer">
      <p class="hint">Tap or Space to flip · N for next card</p>
      <button type="button" id="next-btn" class="next-btn">Next</button>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
